<body>

  <div class="container nav-inner">

      <li><a href="index.html">Home</a></li>

    <div class="nav-icons">

  <a href="orders.html">My Orders</a><a href="cart.html">Cart</a><a href="login.html">Login</a><a href="admin.html">Admin</a>

<div class="page-header"><h1>Shopping Cart</h1><div class="breadcrumb"><a href="index.html">Home</a> / Cart</div></div>

<div class="container cart-layout" id="cartLayout"></div>

<footer class="footer"><div class="footer-bottom container">&copy; 2026 NovaCart. All rights reserved.</div></footer>

<script src="js/script.js"></script>
<script>
  async function renderCart(){
    const cart = await apiGet("/cart/1", []);

    const cartItems = cart.map(item => ({
      id: item.productId,
      name: item.productName,
      image: item.imageUrl,
      price: Number(item.price),
      qty: item.quantity,
      category: ""
    }));

    const layout = document.getElementById("cartLayout");

    if (cartItems.length === 0){
      layout.innerHTML = `
        <div class="empty-state glass" style="grid-column:1/-1;">
          <i class="fa-solid fa-bag-shopping"></i>
          <h3>Your cart is empty</h3>
          <p>Looks like you haven't added anything yet.</p>
          <a href="products.html" class="gradient-btn" style="margin-top:20px;display:inline-block;">Start Shopping</a>
        </div>`;
      return;
    }

    const subtotal = cartItems.reduce((s,i)=>s+i.price*i.qty,0);
    const shipping = subtotal > 2000 ? 0 : 99;
    const tax = Math.round(subtotal * 0.05);
    const total = subtotal + shipping + tax;

    layout.innerHTML = `
      <div>
        ${cartItems.map(item => `
          <div class="cart-item glass">
            <img src="${item.image}" alt="${item.name}">
            <div>
              <span class="cat-tag">${item.category}</span>
              <h4>${item.name}</h4>
              <p style="color:var(--gold);font-weight:700;">₹${item.price.toLocaleString()}</p>
            </div>

            <div class="qty-box">
              <button onclick="changeCartQty(${item.id}, ${item.qty - 1})">-</button>
              <span>${item.qty}</span>
              <button onclick="changeCartQty(${item.id}, ${item.qty + 1})">+</button>
            </div>

            <div style="font-weight:700;">₹${(item.price * item.qty).toLocaleString()}</div>

            <button class="remove-btn" onclick="removeItem(${item.id})">
              <i class="fa-solid fa-trash"></i>
            </button>
          </div>
        `).join("")}
      </div>

      <div class="summary-box glass">
        <h3 style="color:var(--gold);margin-bottom:20px;">Order Summary</h3>
        <div class="summary-row"><span>Subtotal</span><span>₹${subtotal.toLocaleString()}</span></div>
        <div class="summary-row"><span>Shipping</span><span>${shipping===0?'FREE':'₹'+shipping}</span></div>
        <div class="summary-row"><span>Tax (5%)</span><span>₹${tax.toLocaleString()}</span></div>
        <button
  type="button"
  id="checkoutBtn"
  class="gradient-btn"
  style="width:100%;text-align:center;margin-top:20px;display:block;border:none;cursor:pointer;">
  Proceed to Checkout
</button>
        <a href="products.html" class="outline-btn" style="width:100%;text-align:center;margin-top:12px;display:block;">Continue Shopping</a>
      </div>
    `;
    document.getElementById("checkoutBtn").onclick = function () {
    window.location.href = "checkout.html";
};
  }

  async function changeCartQty(id, quantity){
    await apiPut("/cart", {
      userId: 1,
      productId: id,
      quantity: quantity
    });
    renderCart();
  }

  async function removeItem(id){
    await apiDelete(`/cart/1/${id}`);
    renderCart();
    showToast("Item removed from cart");
  }

  renderCart();
</script>
</body>
</html>
