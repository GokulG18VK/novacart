<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<nav class="navbar">
  <div class="container nav-inner">
    <a href="index.html" class="logo">Nova<span>Cart</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html">Shop</a></li>
      <li><a href="wishlist.html">Wishlist</a></li>
      <li><a href="orders.html">My Orders</a></li>
      <li><a href="admin.html">Admin</a></li>
    </ul>
    <div class="search-box"><input type="text" placeholder="Search for products..."><button><i class="fa-solid fa-magnifying-glass"></i></button></div>
    <div class="nav-icons">
      <a href="wishlist.html" class="icon-btn"><i class="fa-regular fa-heart"></i><span class="badge" id="wishlist-count">0</span></a>
      <a href="cart.html" class="icon-btn"><i class="fa-solid fa-bag-shopping"></i><span class="badge" id="cart-count">0</span></a>
      <a href="login.html" class="icon-btn" id="nav-login"><i class="fa-regular fa-user"></i></a>
    </div>
    <button class="menu-toggle"><i class="fa-solid fa-bars"></i></button>
  </div>
</nav>
<div class="drawer-overlay"></div>
<div class="mobile-drawer">
  <a href="index.html">Home</a><a href="products.html">Shop</a><a href="wishlist.html">Wishlist</a>
  <a href="orders.html">My Orders</a><a href="cart.html">Cart</a><a href="login.html">Login</a><a href="admin.html">Admin</a>
</div>

<div class="page-header"><h1>My Orders</h1><div class="breadcrumb"><a href="index.html">Home</a> / My Orders</div></div>

<div class="container orders-table-wrap">
  <div class="glass" style="padding:10px;overflow-x:auto;">
    <table class="orders-table" id="ordersTable">
      <thead>
        <tr><th>Order ID</th><th>Date</th><th>Items</th><th>Total</th><th>Status</th></tr>
      </thead>
      <tbody id="ordersBody"></tbody>
    </table>
  </div>
</div>

<footer class="footer"><div class="footer-bottom container">&copy; 2026 NovaCart. All rights reserved.</div></footer>

<script src="js/script.js"></script>
<script>
  const STATUS_CLASS = { Pending:"status-pending", Shipped:"status-shipped", Delivered:"status-delivered", Cancelled:"status-cancelled" };

  async function loadOrders(){
  const orders = await apiGet("/orders", []);

  const tbody = document.getElementById("ordersBody");

  if (!orders || orders.length === 0){
    document.querySelector(".orders-table-wrap .glass").innerHTML = `
      <div class="empty-state">
        <i class="fa-solid fa-receipt"></i>
        <h3>No orders yet</h3>
        <p>Your placed orders will appear here.</p>
        <a href="products.html" class="gradient-btn" style="margin-top:20px;display:inline-block;">Start Shopping</a>
      </div>`;
    return;
  }

  tbody.innerHTML = orders.map(o => `
    <tr>
      <td>#${o.orderCode || o.id}</td>
      <td>${new Date().toLocaleDateString()}</td>
      <td>${o.items ? o.items.length : 1} item(s)</td>
      <td>₹${Number(o.totalAmount || o.total || 0).toLocaleString()}</td>
      <td><span class="status-pill ${STATUS_CLASS[o.status] || 'status-pending'}">${o.status}</span></td>
    </tr>
  `).join("");
}
  loadOrders();
</script>
</body>
</html>
