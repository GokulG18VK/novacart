<div class="page-header"><h1>My Wishlist</h1><div class="breadcrumb"><a href="index.html">Home</a> / Wishlist</div></div>

  <div class="wishlist-grid" id="wishlistGrid"></div>
</div>

<footer class="footer"><div class="footer-bottom container">&copy; 2026 NovaCart. All rights reserved.</div></footer>

<script src="js/script.js"></script>
<script>
  function renderWishlist(){
    const items = getWishlist();
    const grid = document.getElementById("wishlistGrid");
    if (items.length === 0){
      grid.innerHTML = `
        <div class="empty-state glass" style="grid-column:1/-1;">
          <i class="fa-solid fa-heart-crack"></i>
          <h3>Your wishlist is empty</h3>
          <p>Save items you love for later.</p>
          <a href="products.html" class="gradient-btn" style="margin-top:20px;display:inline-block;">Browse Products</a>
        </div>`;
      return;
    }
    grid.innerHTML = items.map(productCardHTML).join("");
  }
  // override wishlist click to re-render this page after removal
  const origToggle = handleWishlistClick;
  handleWishlistClick = function(id){
    origToggle(id);
    setTimeout(renderWishlist, 50);
  };
  renderWishlist();
</script>
</body>
