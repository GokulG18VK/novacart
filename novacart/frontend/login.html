<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | NovaCart</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<nav class="navbar">
  <div class="container nav-inner">
    <a href="index.html" class="logo">Nova<span>Cart</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html">Shop</a></li>
    </ul>
    <div></div>
    <div class="nav-icons"></div>
  </div>
</nav>

<div class="auth-wrapper">
  <div class="auth-box glass">
    <h2>Welcome Back</h2>
    <p class="sub">Login to your NovaCart account</p>
    <form id="loginForm">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <div class="checkbox-row">
        <label><input type="checkbox" style="accent-color:var(--gold);"> Remember me</label>
        <a href="#">Forgot Password?</a>
      </div>
      <button type="submit" class="gradient-btn">Login</button>
    </form>
    <p class="auth-switch">Don't have an account? <a href="register.html">Register</a></p>
    <p class="auth-switch" style="margin-top:6px;">Admin? <a href="admin.html">Go to Admin Dashboard</a></p>
  </div>
</div>

<script src="js/script.js"></script>
<script>
  document.getElementById("loginForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    // Calls Spring Boot REST API: POST /api/users/login (JdbcTemplate verifies credentials)
    const result = await apiPost("/users/login", { email, password });

    if (result && result.success){
      setUser(result.user);
      showToast("Login successful!");
      setTimeout(()=> window.location.href = "index.html", 800);
    } else {
      // Demo fallback so the frontend is testable without backend running
      setUser({ id: 1, name: email.split("@")[0], email });
      showToast("Logged in (demo mode — connect backend for real auth)");
      setTimeout(()=> window.location.href = "index.html", 1000);
    }
  });
</script>
</body>
</html>
