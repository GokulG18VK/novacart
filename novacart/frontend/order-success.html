<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed | NovaCart</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<nav class="navbar">
  <div class="container nav-inner">
    <a href="index.html" class="logo">Nova<span>Cart</span></a>
    <div></div><div></div>
  </div>
</nav>

<div class="success-wrapper">
  <div>
    <div class="success-icon"><i class="fa-solid fa-check"></i></div>
    <h1>Order Placed Successfully!</h1>
    <p>Thank you for shopping with NovaCart. Your order is being processed and will be shipped soon.</p>
    <div class="order-id-box">Order ID: <span id="orderIdDisplay"></span></div>
    <br>
    <div class="hero-btns" style="justify-content:center;">
      <a href="orders.html" class="gradient-btn">Track Order</a>
      <a href="products.html" class="outline-btn">Continue Shopping</a>
    </div>
  </div>
</div>

<footer class="footer"><div class="footer-bottom container">&copy; 2026 NovaCart. All rights reserved.</div></footer>

<script src="js/script.js"></script>
<script>
  const orderId = new URLSearchParams(window.location.search).get("orderId") || "N/A";
  document.getElementById("orderIdDisplay").innerText = orderId;
</script>
</body>
</html>
