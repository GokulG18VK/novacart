<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | NovaCart</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<nav class="navbar">
  <div class="container nav-inner">
    <a href="index.html" class="logo">Nova<span>Cart</span></a>
    <ul class="nav-links"><li><a href="index.html">Home</a></li><li><a href="products.html">Shop</a></li></ul>
    <div></div><div class="nav-icons"></div>
  </div>
</nav>

<div class="auth-wrapper">
  <div class="auth-box glass">
    <h2>Create Account</h2>
    <p class="sub">Join NovaCart for exclusive deals</p>
    <form id="registerForm">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="John Doe" required>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="+91 98765 43210" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Create a password" required>
      </div>
      <button type="submit" class="gradient-btn">Create Account</button>
    </form>
    <p class="auth-switch">Already have an account? <a href="login.html">Login</a></p>
  </div>
</div>

<script src="js/script.js"></script>
<script>
  document.getElementById("registerForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const payload = {
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      phone: document.getElementById("phone").value,
      password: document.getElementById("password").value,
    };
    // Calls Spring Boot REST API: POST /api/users/register (JdbcTemplate inserts new row)
    const result = await apiPost("/users/register", payload);

    if (result && result.success){
      showToast("Account created successfully!");
    } else {
      showToast("Account created (demo mode — connect backend to persist in MySQL)");
    }
    setTimeout(()=> window.location.href = "login.html", 1200);
  });
</script>
</body>
</html>
