# ===========================================================
# NovaCart Backend Configuration
# ===========================================================

# Server
server.port=8080

# ----------- MySQL / JDBC Connection -----------
# Make sure you have created the database first: CREATE DATABASE novacart_db;
spring.datasource.url=jdbc:mysql://localhost:3306/novacart_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ----------- Auto-run schema.sql on startup -----------
# This creates all required tables automatically (users, products, categories, cart, wishlist, orders, order_items)
spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:schema.sql
spring.jpa.hibernate.ddl-auto=none

# ----------- CORS (allow frontend running on file:// or live server) -----------
# Configured in WebConfig.java instead, kept here for reference only.

# ----------- Logging -----------
logging.level.org.springframework.jdbc.core=INFO
logging.level.com.novacart=DEBUG
spring.sql.init.continue-on-error=true